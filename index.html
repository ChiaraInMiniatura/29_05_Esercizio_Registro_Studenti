<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

    <title>Registro Studenti</title>
</head>

<body>

    <div class="container py-5">

        <!-- TITOLO -->
        <div class="text-center mb-5">

            <h1 class="main-title">
                Registro Studenti
            </h1>

        </div>


        <!-- FORM -->
        <div class="custom-card p-4 mb-4">

            <h3 class="section-title mb-4">
                Aggiungi Studente
            </h3>

            <form>

                <div class="row">

                    <!-- NOME -->
                    <div class="col-md-6 mb-3">

                        <label class="form-label">
                            Nome
                        </label>

                        <input 
                            type="text"
                            class="form-control custom-input"
                            id="nome"
                            placeholder="Inserisci nome"
                        >

                    </div>

                    <!-- COGNOME -->
                    <div class="col-md-6 mb-3">

                        <label class="form-label">
                            Cognome
                        </label>

                        <input 
                            type="text"
                            class="form-control custom-input"
                            id="cognome"
                            placeholder="Inserisci cognome"
                        >

                    </div>

                    <!-- ETA -->
                    <div class="col-md-4 mb-3">

                        <label class="form-label">
                            Età
                        </label>

                        <input 
                            type="number"
                            class="form-control custom-input"
                            id="eta"
                            placeholder="Età"
                        >

                    </div>

                    <!-- VOTO -->
                    <div class="col-md-4 mb-3">

                        <label class="form-label">
                            Voto
                        </label>

                        <input 
                            type="number"
                            class="form-control custom-input"
                            id="voto"
                            placeholder="Voto"
                        >

                    </div>

                    <!-- SPORT 1 -->
                    <div class="col-md-4 mb-3">

                        <label class="form-label">
                            Primo Sport
                        </label>

                        <input 
                            type="text"
                            class="form-control custom-input"
                            id="sport1"
                            placeholder="Es: Calcio"
                        >

                    </div>

                    <!-- SPORT 2 -->
                    <div class="col-md-12 mb-4">

                        <label class="form-label">
                            Secondo Sport
                        </label>

                        <input 
                            type="text"
                            class="form-control custom-input"
                            id="sport2"
                            placeholder="Es: Basket"
                        >

                    </div>

                </div>

                <!-- BOTTONE -->
                <button 
                    type="button"
                    class="btn custom-btn w-100"
                    id="aggiungiStudente"
                >
                    AGGIUNGI STUDENTE
                </button>

            </form>

        </div>
         <!-- AZIONI -->
        <div class="custom-card p-4 mb-4">

            <h3 class="section-title mb-4">
                Azioni
            </h3>

            <div class="row g-3">

                <div class="col-md-3">
                    <button class="btn action-btn w-100" id="mostraStudenti">
                        Mostra Studenti
                    </button>
                </div>

                <div class="col-md-3">
                    <button class="btn action-btn w-100" id="mediaVoti">
                        Media Voti
                    </button>
                </div>

                <div class="col-md-3">
                    <button class="btn action-btn w-100" id="primoStudente">
                        Mostra Primo Studente
                    </button>
                </div>

                <div class="col-md-3">
                    <button class="btn action-btn w-100" id="aggiungiPromosso">
                        Promossi o Bocciati
                    </button>
                </div>

                <div class="col-md-3">
                    <button class="btn action-btn w-100" id="eliminaEta">
                        Elimina Età Primo Studente
                    </button>
                </div>

                <div class="col-md-3">
                    <button class="btn action-btn w-100" id="mostraChiavi">
                        Mostra Chiavi Primo Studente
                    </button>
                </div>

                <div class="col-md-3">
                    <button class="btn action-btn w-100" id="mostraValori">
                        Mostra Valori Primo Studente
                    </button>
                </div>

                <div class="col-md-3">
                    <button class="btn action-btn w-100" id="clonaStudente">
                        Clona Primo Studente
                    </button>
                </div>

            </div>

        </div>



        <!-- RISULTATI -->
        <div class="custom-card p-4 output-card">

            <div class="d-flex justify-content-between align-items-center mb-3">

                <h3 class="section-title m-0">
                    Risultati JS
                </h3>

            </div>

            <div id="output">
                

            </div>
              <div class="col-md-3 mt-2">
                    <button class="btn action-btn w-100" id="pulisci">
                        Pulisci
                    </button>
                </div>

        </div>
        

    </div>

    <script src="main.js"></script>

</body>
</html>
